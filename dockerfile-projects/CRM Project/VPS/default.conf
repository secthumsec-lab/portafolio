##
# SuiteCRM Nginx Configuration
# Configuración optimizada con seguridad y rendimiento
##

# Cache de límite de velocidad - Anti DDoS
limit_req_zone $binary_remote_addr zone=gen_limit:10m rate=10r/s;
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=30r/s;

# Upstream PHP-FPM
upstream php_backend {
    server suitecrm_app:9000;
}

##
# Servidor HTTP - Redirige a HTTPS
##
server {
    listen 80;
    listen [::]:80;
    server_name _;

    # Redirigir todo HTTP a HTTPS
    return 301 https://$host$request_uri;
}

##
# Servidor HTTPS Principal
##
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name _;

    # Certificados SSL (auto-generados o proporcionados)
    ssl_certificate /etc/ssl/certs/nginx.crt;
    ssl_certificate_key /etc/ssl/private/nginx.key;

    # Configuración SSL segura
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # HSTS - Strict Transport Security
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Headers de seguridad
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

    # Compresión GZIP
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml text/javascript 
               application/json application/javascript application/xml+rss 
               application/rss+xml application/atom+xml image/svg+xml;

    # Raíz del sitio
    root /var/www/html;
    index index.php index.html;

    # Logging
    access_log /var/log/nginx/suitecrm_access.log combined;
    error_log /var/log/nginx/suitecrm_error.log warn;

    # Tamaño máximo de carga
    client_max_body_size 32M;

    # Archivos estáticos/privados
    location ~ /\. {
        deny all;
    }

    location ~ ~$ {
        deny all;
    }

    # Directorios que no deben ser accesibles
    location ~ ^/(cache|cache/engines|modules|temp|modules_c|config|custom/externals|custom/modulelogic|install) {
        deny all;
    }

    # API endpoints - Límite de velocidad más alto
    location /api/ {
        limit_req zone=api_limit burst=50 nodelay;
        try_files $uri $uri/ /index.php?$query_string;
    }

    # Límite de velocidad general
    location / {
        limit_req zone=gen_limit burst=20 nodelay;
        try_files $uri $uri/ /index.php?$query_string;
    }

    # Procesamiento PHP
    location ~ \.php$ {
        # Anti DDoS
        limit_req zone=gen_limit burst=20 nodelay;

        try_files $uri =404;
        fastcgi_pass php_backend;
        fastcgi_index index.php;

        # Headers FastCGI
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param REQUEST_METHOD $request_method;
        fastcgi_param QUERY_STRING $query_string;
        fastcgi_param CONTENT_TYPE $content_type;
        fastcgi_param CONTENT_LENGTH $content_length;
        fastcgi_param SERVER_PROTOCOL $server_protocol;
        fastcgi_param SERVER_SOFTWARE nginx;
        fastcgi_param REMOTE_ADDR $remote_addr;
        fastcgi_param REMOTE_PORT $remote_port;
        fastcgi_param SERVER_ADDR $server_addr;
        fastcgi_param SERVER_PORT $server_port;
        fastcgi_param SERVER_NAME $server_name;
        fastcgi_param REQUEST_URI $request_uri;
        fastcgi_param DOCUMENT_URI $document_uri;
        fastcgi_param SCRIPT_NAME $script_name;
        fastcgi_param HTTPS $https;
        fastcgi_param REQUEST_SCHEME $scheme;

        # Timeouts
        fastcgi_connect_timeout 300s;
        fastcgi_send_timeout 300s;
        fastcgi_read_timeout 300s;

        # Buffer settings
        fastcgi_buffering off;
        fastcgi_buffer_size 4k;
        fastcgi_buffers 8 4k;

        # Headers de seguridad para respuestas PHP
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-XSS-Protection "1; mode=block" always;
    }

    # Archivos estáticos - Cache del navegador
    location ~* \.(jpg|jpeg|png|gif|ico|css|js|svg|woff|woff2|ttf|eot)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Deshabilitar acceso a archivos .env y similares
    location ~ /\.(env|htaccess|htpasswd|git|svn|cvs|hg|mysql|phpMyAdmin)$ {
        deny all;
    }

    # Health check endpoint
    location /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }
}
