version: "3.8"

services:
  suitecrm_db:
    image: mysql:8.0
    container_name: suitecrm_db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD_FILE: /run/secrets/mysql_root_password
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD_FILE: /run/secrets/mysql_password
      MYSQL_ALLOW_EMPTY_PASSWORD: "false"
      TZ: "America/Sao_Paulo"
    secrets:
      - mysql_root_password
      - mysql_password
    volumes:
      - crmproject_db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 30
      interval: 5s
      start_period: 40s
    networks:
      - crmnet
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  suitecrm_app:
    build: .
    container_name: suitecrm_app
    restart: unless-stopped
    ports:
      - "8080:80"
    environment:
      DB_HOST: suitecrm_db
      DB_NAME: ${MYSQL_DATABASE}
      DB_USER: ${MYSQL_USER}
      DB_PASSWORD_FILE: /run/secrets/mysql_password
      TZ: "America/Sao_Paulo"
    secrets:
      - mysql_password
    depends_on:
      suitecrm_db:
        condition: service_healthy
    volumes:
      - crmproject_data:/var/www/html
    healthcheck:
      test: ["CMD", "curl", "-s", "http://localhost/" ]
      timeout: 10s
      retries: 30
      interval: 5s
      start_period: 30s
    networks:
      - crmnet
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  crmproject_db_data:
  crmproject_data:

networks:
  crmnet:

secrets:
  mysql_root_password:
    file: ./secrets/mysql_root_password.txt
  mysql_password:
    file: ./secrets/mysql_password.txt