;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;
; Configuración de PHP para SuiteCRM
;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;

; Límites de carga
upload_max_filesize = 32M
post_max_size = 32M
memory_limit = 256M
max_execution_time = 300
max_input_time = 300

; Seguridad
display_errors = Off
log_errors = On
error_log = /var/log/php-errors.log
expose_php = Off
allow_url_fopen = On
allow_url_include = Off

; Sesiones seguras
session.secure = Off
session.httponly = On
session.samesite = Lax
session.gc_maxlifetime = 3600
session.cookie_httponly = 1

; OPcache - Optimización de rendimiento
opcache.enable = 1
opcache.memory_consumption = 128
opcache.interned_strings_buffer = 8
opcache.max_accelerated_files = 4000
opcache.revalidate_freq = 60
opcache.fast_shutdown = 1
opcache.enable_cli = 0

; Funciones peligrosas deshabilitadas
disable_functions = exec,passthru,shell_exec,system,proc_open,popen,curl_exec,curl_multi_exec

; Límites de recursos
max_file_uploads = 20
default_socket_timeout = 60

; Tipo MIME
default_charset = "UTF-8"

; Date/Time
date.timezone = America/Sao_Paulo
# Desabilitar JIT para evitar error de compilación
opcache.jit_buffer_size = 0

; Desabilitar JIT para evitar error de compilación en PHP 8.1
opcache.jit_buffer_size = 0
