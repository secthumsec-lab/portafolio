events {}

http {

  upstream espocrm {
      server espocrm:80;
  }

  upstream grafana {
      server grafana:3000;
  }

  upstream prometheus {
      server prometheus:9090;
  }

  server {
      listen 80;

      location / {
          proxy_pass http://espocrm;
          proxy_set_header Host $host;
          proxy_set_header X-Real-IP $remote_addr;
      }

      location /grafana/ {
          proxy_pass http://grafana/;
      }

      location /prometheus/ {
          proxy_pass http://prometheus/;
      }

  }
}